    format: json
    auth: none
    method: POST
    rate_limit: "100 CUI/req, 1 req/s"
    cadence: ondemand
    phase: 3
    priority: high
    connector: fiscal/anaf
    status: planned
    docs: "https://static.anaf.ro/static/10/Anaf/Informatii_R/Servicii_web/doc_WS_V8.txt"

