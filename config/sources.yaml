# ----------------------------------------------------------------------------
# L. TIER 3 — SERVICII DECONCENTRATE (templated: tip × 42 unități)
# ----------------------------------------------------------------------------
  - id: deconcentrate
    name: "Servicii publice deconcentrate (Tier 3)"
    category: deconcentrated
    tier: deconcentrated
    access: scrape
    phase: 5
    priority: medium
    connector: institutie/deconcentrat_template
    status: planned
    coordinated_by: "Prefect ({jud}.prefectura.mai.gov.ro)"
    units: 42                # 41 județe + București (unele regionale → ~900-1100 real)
    service_types:
      sanatate_social: [DSP, CAS, CJP, AJPIS]
      munca: [AJOFM, ITM]
      educatie_cultura: [ISJ, DJC, DJST]
      agricultura: [DAJ, DSVSA, APIA, OJFIR, ANIF]
      mediu: [APM, GNM, "Garda Forestieră", SGA]
      finante: [DGRFP, AJFP, DRV]     # DGRFP/DRV regionale
      registre: [OCPI, ORC]
      ordine: [IPJ, IJJ, ISU]
      consumator: [CJPC, OPC]
      statistica: [DJS]               # regional

