# ============================================================================
# ROMEGA — Registrul de surse (single source of truth pentru connectors)
# ----------------------------------------------------------------------------
# Acest fișier e CONSUMAT de connectors (pipeline-ul citește de aici) ȘI e
# echivalentul machine-readable al docs/03-SOURCES.md. Nu lăsa cele două să
# diveargă: orice sursă nouă se adaugă AICI întâi.
#
# access:   api | bulk | scrape | headless | paid
# cadence:  daily | weekly | monthly | onbuild | ondemand
# tier:     central | subordinated | deconcentrated | local_autonomy | parliament
# phase:    0..5  (valul din docs/00-MASTERPLAN.md)
# status:   planned | wip | active
# ============================================================================

meta:
  version: 0.1.0
  updated: "2026-06-01"
  note: "Verificat iunie 2026. Vezi docs/03-SOURCES.md pentru context."

defaults:
  user_agent: "ROMEGA-bot/0.1 (+https://github.com/Endimion2k/romega; transparenta date publice)"
  rate_limit_per_host: "1/s"
  respect_robots: true
  cache_bronze: true

# ----------------------------------------------------------------------------
# A. PARLAMENT
# ----------------------------------------------------------------------------
sources:
  - id: cdep
    name: "Camera Deputaților"
    category: parliament
    tier: parliament
    base_url: "https://www.cdep.ro"
    access: scrape
    format: [html, xml, pdf]
    auth: none
    cadence: daily
    phase: 0
    priority: high
    connector: parlament/cdep
    status: planned
    needs_self_hosted_runner: true   # geo-block cloud IPs
    notes: "Portare 1:1 a scriptelor run_*.py din cdep-api-poc. Sursa bicamerală a legii (cam=1=Senat)."

  - id: senat
    name: "Senatul României"
    category: parliament
    tier: parliament
    base_url: "https://www.senat.ro"
    access: scrape
    format: [html, pdf]
    auth: none
    cadence: daily
    phase: 1
    priority: high
    connector: parlament/senat
    status: planned
    needs_self_hosted_runner: true
    id_scheme: guid                  # NU împarte ID cu cdep → crosswalk pe nume+legislatură
    endpoints:
      senators: "FisaSenatori.aspx"
      senator: "FisaSenator.aspx?ParlamentarID={guid}"
      votes: "Voturiplen.aspx"
      bills: "legiproiect.aspx"
      bill_file: "Legis/Lista.aspx?cod={cod}&NR={nr}&AN={an}"
      questions: "VizualizareIntrebariInterpelari.aspx"
      committees: "EnumComisii.aspx?Permanenta=1"
      stenograms: "StenoPag2.aspx"

