# H. ACȚIONARIAT / PROPRIETATE (vezi tensiunea T1 în STATE.md)
# ----------------------------------------------------------------------------
  - id: onrc_dump
    name: "data.gov.ro — dump ONRC (firme + reprezentanți legali)"
    category: ownership
    access: bulk
    format: csv
    license: "CC BY 4.0"
    phase: 3
    priority: high
    connector: opendata/datagov
    status: planned
    files: [OD_FIRME.CSV, OD_REPREZENTANTI_LEGALI, OD_CAEN_AUTORIZAT, OD_STARE_FIRMA, OD_SUCURSALE_ALTE_STATE_MEMBRE]
    notes: "GRATIS. Conține reprezentanți legali, NU asociați/% și NU UBO."

  - id: termene
    name: "termene.ro — API acționariat (Asociați și Administratori)"
    category: ownership
    base_url: "https://apis.termene.ro"
    access: paid
    format: json
    auth: subscription
    phase: 3
    priority: medium
    connector: companii/ownership
    status: blocked            # depinde de decizia de buget T1
    provides_shareholders: true
    notes: "Asociați: nume, funcție, %, dată naștere. ToS: fără republicare în masă."

  - id: risco
    name: "risco.ro — API ACT (acționari + cote)"
    category: ownership
    access: paid
    format: json
    pricing: "~1 RON/query, min 100 RON/lună"
    phase: 3
    priority: medium
    connector: companii/ownership
    status: blocked            # depinde de T1
    provides_shareholders: true

  - id: ubo
    name: "Registrul Beneficiarilor Reali (UBO)"
    category: ownership
    base_url: "https://www.onrc.ro/index.php/ro/informatii-privind-beneficiarii-reali"
    access: paid
    phase: null
    priority: out_of_scope
    status: blocked
    legal: "Legea 86/2025 — interes legitim + taxă + semnătură; jurnaliștii pot fi refuzați"
    notes: "Practic în afara scopului automat (restricționat din 2025)."

