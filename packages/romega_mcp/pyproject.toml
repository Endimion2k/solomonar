[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "romega-mcp"
version = "0.1.0"
description = "Server MCP ROMEGA — date de transparență ale statului român pentru interogare conversațională"
requires-python = ">=3.10"
dependencies = ["mcp[cli]>=1.2"]

[project.scripts]
romega-mcp = "romega_mcp.server:run"

[tool.setuptools]
packages = ["romega_mcp"]
package-dir = { "romega_mcp" = "." }
